name: Build ISOs

# Product track:
#   - QEMU 9.2 + qemu-3dfx built on Void glibc (matches appliance ABI)
#   - Void Linux glibc x86_64 hybrid ISO with that QEMU baked into /usr/local
#   - Multi-platform nq-disk host helpers + release zips

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  QEMU_VERSION: "9.2.2"
  QEMU_3DFX_REF: "eefd567ddc7d718ab5848f9d04df0dfd40776cf1"
  VOID_IMAGE: "ghcr.io/void-linux/void-glibc-full:latest"

jobs:
  # ---- QEMU 9.2 + 3dfx on Void glibc (ABI-compatible with the ISO) ----------
  # Built via Docker (not job container) so actions/checkout can use Node on Ubuntu.
  build-qemu-3dfx:
    name: QEMU 9.2 + 3dfx (Void glibc)
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build and pack qemu-3dfx (Void container)
        env:
          QEMU_VERSION: ${{ env.QEMU_VERSION }}
          QEMU_3DFX_REF: ${{ env.QEMU_3DFX_REF }}
        run: |
          set -euo pipefail
          docker pull "${{ env.VOID_IMAGE }}"
          docker run --rm \
            -e QEMU_VERSION -e QEMU_3DFX_REF \
            -v "$PWD":/repo -w /repo \
            "${{ env.VOID_IMAGE }}" \
            bash -lc '
              set -euo pipefail
              xbps-install -Syu xbps || true
              xbps-install -Sy git curl tar xz rsync \
                gcc make pkg-config python3 ninja \
                glib-devel pixman-devel SDL2-devel libepoxy-devel \
                libslirp-devel dtc zlib-devel libzstd-devel \
                bash flex bison ca-certificates
              chmod +x build/qemu-3dfx.sh
              ./build/qemu-3dfx.sh --pack
            '
          ls -lh dist/qemu-3dfx-x86_64.tar.gz
          tar tzf dist/qemu-3dfx-x86_64.tar.gz | grep 'bin/qemu-system-x86_64$'

      - name: Upload qemu-3dfx tarball
        uses: actions/upload-artifact@v7
        with:
          name: qemu-3dfx-x86_64
          path: dist/qemu-3dfx-x86_64.tar.gz
          if-no-files-found: error

  nq-disk:
    name: nq-disk (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            platform: macos-arm64
            bin_name: nq-disk
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            platform: linux-x86_64
            bin_name: nq-disk
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            platform: linux-aarch64
            bin_name: nq-disk
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            platform: windows-x86_64
            bin_name: nq-disk.exe
            is_windows: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build nq-disk
        shell: bash
        run: |
          set -euo pipefail
          cargo build -p nq-disk --release
          mkdir -p "dist/nq-disk/${{ matrix.platform }}"
          if [ "${{ matrix.is_windows }}" = "true" ]; then
            cp target/release/nq-disk.exe "dist/nq-disk/${{ matrix.platform }}/${{ matrix.bin_name }}"
          else
            cp target/release/nq-disk "dist/nq-disk/${{ matrix.platform }}/${{ matrix.bin_name }}"
            chmod +x "dist/nq-disk/${{ matrix.platform }}/${{ matrix.bin_name }}"
          fi

      - name: Test nq-disk
        shell: bash
        run: cargo test -p nq-disk

      - name: Upload nq-disk
        uses: actions/upload-artifact@v7
        with:
          name: nq-disk-${{ matrix.platform }}
          path: dist/nq-disk/${{ matrix.platform }}/*
          if-no-files-found: error

  # ---- Void glibc ISO with qemu-3dfx + agent baked in ------------------------
  build:
    name: Build x86_64 ISO (Void + 3dfx)
    needs: [build-qemu-3dfx]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          lfs: true

      - name: Install Rust (glibc agent)
        uses: dtolnay/rust-toolchain@stable

      - name: Build native-qemu-agent
        run: |
          set -euo pipefail
          cargo build -p native-qemu-agent --locked --release
          test -x target/release/native-qemu-agent

      - name: Download qemu-3dfx tarball
        uses: actions/download-artifact@v8
        with:
          name: qemu-3dfx-x86_64
          path: dist

      - name: Build Void ISO (privileged Docker)
        run: |
          set -euo pipefail
          chmod +x build/void-iso.sh build/void-postsetup.sh
          chmod +x build/void-include/etc/sv/native-qemu-agent/run
          chmod +x build/void-include/etc/sv/native-qemu-agent/finish
          ls -lh dist/qemu-3dfx-x86_64.tar.gz
          # void-iso.sh re-execs into Void full image with --privileged for mklive
          sudo ./build/void-iso.sh \
            --qemu-tarball dist/qemu-3dfx-x86_64.tar.gz \
            --agent-bin target/release/native-qemu-agent \
            --outdir dist
          test -f dist/native-qemu-x86_64.iso
          ls -lh dist/native-qemu-x86_64.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v7
        with:
          name: native-qemu-x86_64
          path: dist/native-qemu-x86_64.iso
          if-no-files-found: error

  package:
    name: Package release zips
    needs: [build, nq-disk, build-qemu-3dfx]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Pack per-platform zips
        run: |
          set -euo pipefail
          mkdir -p dist/release

          iso_x64=$(find artifacts/native-qemu-x86_64 -name '*.iso' | head -n1)
          test -n "$iso_x64"
          qemu_tb=$(find artifacts/qemu-3dfx-x86_64 -name 'qemu-3dfx-x86_64.tar.gz' | head -n1)
          test -n "$qemu_tb"

          pack_one() {
            local platform="$1"
            local dir="artifacts/nq-disk-${platform}"
            local bin
            bin=$(find "$dir" -type f \( -name 'nq-disk' -o -name 'nq-disk.exe' \) | head -n1)
            test -n "$bin"

            local zipdir
            zipdir=$(mktemp -d)
            if [[ "$bin" == *.exe ]]; then
              cp "$bin" "$zipdir/nq-disk.exe"
            else
              cp "$bin" "$zipdir/nq-disk"
              chmod +x "$zipdir/nq-disk"
            fi
            cp "$iso_x64" "$zipdir/native-qemu-x86_64.iso"
            # Also ship the tarball for developers rebuilding rootfs / debugging.
            cp "$qemu_tb" "$zipdir/qemu-3dfx-x86_64.tar.gz"

            cat > "$zipdir/README.txt" <<EOF
          native-qemu — flash kit (${platform})
          =====================================

          Contents
            nq-disk[.exe]                 host helper (this platform) — needs sudo
            native-qemu-x86_64.iso        Void glibc live ISO with QEMU 9.2+3dfx
                                          baked in at /usr/local/bin/qemu-system-x86_64
            qemu-3dfx-x86_64.tar.gz       same QEMU prefix (optional extract / rebuild)

          Quick start
            1. sudo ./nq-disk   (or Run as administrator on Windows)
            2. Flash ISO → Edit config → Load image.qcow2 → Unmount
            3. Boot the stick on an x86_64 PC (KVM). Agent runs on tty1.

          Project: https://github.com/${{ github.repository }}
          EOF

            local out="dist/release/native-qemu-${platform}.zip"
            (cd "$zipdir" && zip -9 -r "$GITHUB_WORKSPACE/$out" .)
            echo "packed $out ($(du -h "$GITHUB_WORKSPACE/$out" | awk '{print $1}'))"
            rm -rf "$zipdir"
          }

          pack_one macos-arm64
          pack_one linux-x86_64
          pack_one linux-aarch64
          pack_one windows-x86_64

          cp "$iso_x64" dist/release/native-qemu-x86_64.iso
          cp "$qemu_tb" dist/release/qemu-3dfx-x86_64.tar.gz

          ls -lah dist/release/

      - name: Upload release package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: native-qemu-release-packages
          path: dist/release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [package]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download packages
        uses: actions/download-artifact@v8
        with:
          name: native-qemu-release-packages
          path: dist/release

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/release/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          body: |
            ## Downloads

            Pick the zip for the **computer you use to flash the USB**:

            | Host | Zip |
            |---|---|
            | macOS Apple Silicon | `native-qemu-macos-arm64.zip` |
            | Linux x86_64 | `native-qemu-linux-x86_64.zip` |
            | Linux ARM64 | `native-qemu-linux-aarch64.zip` |
            | Windows x86_64 | `native-qemu-windows-x86_64.zip` |

            Each zip includes:
            - **`nq-disk`** (needs sudo / Administrator)
            - **`native-qemu-x86_64.iso`** — **Void glibc** live appliance with **QEMU 9.2 + 3dfx/MESA** at `/usr/local/bin/qemu-system-x86_64`
            - **`qemu-3dfx-x86_64.tar.gz`** — same QEMU prefix (devtools / rebuild)
